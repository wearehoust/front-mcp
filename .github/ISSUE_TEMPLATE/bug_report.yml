name: Bug Report
description: Report a bug in front-mcp
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Configure with...
        2. Call tool...
        3. See error...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Error output
      description: Run with `FRONT_MCP_LOG_LEVEL=debug` and paste the output.
      render: shell
  - type: dropdown
    id: auth
    attributes:
      label: Authentication method
      options:
        - OAuth
        - API Token
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      placeholder: "22.15.1"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 15 / Ubuntu 24.04 / Windows 11"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: front-mcp version
      placeholder: "1.0.0"
    validations:
      required: true
